apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 20h0m0s
  chart:
    spec:
      chart: cert-manager
      version: v1.20.1
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: cert-manager
  values:
    crds:
      enabled: true
    global:
      priorityClassName: system-cluster-critical
    dns01RecursiveNameservers: "1.1.1.1:53"
