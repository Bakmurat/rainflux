apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: flux-system
spec:
  chart:
    spec:
      chart: policy-reporter
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: flux-system
  interval: 20h0m0s
  install:
    createNamespace: true
  targetNamespace: policy-reporter
  dependsOn:
    - name: kyverno
      namespace: kyverno
  values:
    replicaCount: 1

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

    ui:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi

    plugin:
      kyverno:
        enabled: true
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
