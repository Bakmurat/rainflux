apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  chart:
    spec:
      chart: kyverno
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  interval: 20h0m0s
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  targetNamespace: kyverno
  values:
    admissionController:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 384Mi

    backgroundController:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 256Mi

    cleanupController:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 256Mi

    reportsController:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 256Mi
