apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluentd
  namespace: flux-system
spec:
  interval: 20h0m0s
  chart:
    spec:
      chart: fluentd
      version: 0.5.2
      sourceRef:
        kind: HelmRepository
        name: fluent
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: logging
  dependsOn:
    - name: elasticsearch
  values:
    # DaemonSet: one fluentd pod per node, tailing /var/log/containers.
    kind: DaemonSet
    # The chart's default image (fluent/fluentd base) does NOT ship the
    # elasticsearch output plugin. The kubernetes-daemonset image does, so
    # we override the image just for the plugins — not for its baked-in
    # config, which is shadowed by the chart's ConfigMap mount at /fluentd/etc.
    image:
      repository: fluent/fluentd-kubernetes-daemonset
      tag: v1.17.1-debian-elasticsearch8-1.0
    # Tolerate all taints so we collect from control-plane nodes too.
    tolerations:
      - operator: Exists
    # Mount host paths for container logs.
    mounts:
      logLocations:
        - /var/log
        - /var/lib/docker/containers
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # The chart also creates a Service by default; we don't need it.
    service:
      enabled: false

    ## Fluentd pipeline:
    ##   sources  → @KUBERNETES label → kube_metadata filter →
    ##   @DISPATCH label → prometheus metrics → @OUTPUT label → elasticsearch
    fileConfigs:
      01_sources.conf: |-
        ## logs from containerd/CRI
        <source>
          @type tail
          @id in_tail_container_logs
          @label @KUBERNETES
          path /var/log/containers/*.log
          pos_file /var/log/fluentd-containers.log.pos
          tag kubernetes.*
          read_from_head true
          <parse>
            @type multi_format
            <pattern>
              format json
              time_key time
              time_type string
              time_format "%Y-%m-%dT%H:%M:%S.%NZ"
              keep_time_key false
            </pattern>
            <pattern>
              format regexp
              expression /^(?<time>.+) (?<stream>stdout|stderr)( (.))? (?<log>.*)$/
              time_format '%Y-%m-%dT%H:%M:%S.%NZ'
              keep_time_key false
            </pattern>
          </parse>
          emit_unmatched_lines true
        </source>

        # expose metrics in prometheus format
        <source>
          @type prometheus
          bind 0.0.0.0
          port 24231
          metrics_path /metrics
        </source>

      02_filters.conf: |-
        <label @KUBERNETES>
          <match kubernetes.var.log.containers.fluentd**>
            @type relabel
            @label @FLUENT_LOG
          </match>

          # <match kubernetes.var.log.containers.**_kube-system_**>
          #   @type null
          #   @id ignore_kube_system_logs
          # </match>

          <filter kubernetes.**>
            @type kubernetes_metadata
            @id filter_kube_metadata
            skip_labels false
            skip_container_metadata false
            skip_namespace_metadata true
            skip_master_url true
          </filter>

          <match **>
            @type relabel
            @label @DISPATCH
          </match>
        </label>

      03_dispatch.conf: |-
        <label @DISPATCH>
          <filter **>
            @type prometheus
            <metric>
              name fluentd_input_status_num_records_total
              type counter
              desc The total number of incoming records
              <labels>
                tag ${tag}
                hostname ${hostname}
              </labels>
            </metric>
          </filter>

          <match **>
            @type relabel
            @label @OUTPUT
          </match>
        </label>

      04_outputs.conf: |-
        <label @OUTPUT>
          <match **>
            @type elasticsearch
            host "elasticsearch-master"
            port 9200
            path ""
            scheme http
            user elastic
            password changeme
            # Don't wait for elastic to start up.
            verify_es_version_at_startup false
          </match>
        </label>
