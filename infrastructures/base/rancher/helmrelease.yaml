apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher
  namespace: flux-system
spec:
  interval: 20h0m0s
  chart:
    spec:
      chart: rancher
      version: 2.13.3
      sourceRef:
        kind: HelmRepository
        name: rancher-stable
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: cattle-system
  values:
    hostname: rancher.bolunas.com
    tls: ingress
    ingress:
      enabled: true
      ingressClassName: nginx
    replicas: 1
