apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kibana
  namespace: flux-system
spec:
  interval: 20h0m0s
  chart:
    spec:
      chart: kibana
      version: 8.5.1
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: logging
  # Kibana can't start until Elasticsearch is reachable; let helm-controller
  # install ES first so Kibana doesn't waste retries.
  dependsOn:
    - name: elasticsearch
  values:
    elasticsearchHosts: "http://elasticsearch-master:9200"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
