apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elasticsearch
  namespace: flux-system
spec:
  chart:
    spec:
      chart: elasticsearch
      version: 7.17.3
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: flux-system
  interval: 20h0m0s
  install:
    createNamespace: true
  targetNamespace: logging
  values:
    clusterName: "elasticsearch"
    nodeGroup: "master"
    roles:
      master: "true"
      ingest: "true"
      data: "true"
      remote_cluster_client: "true"
      ml: "true"

    replicas: 1
    minimumMasterNodes: 1

    image: "docker.elastic.co/elasticsearch/elasticsearch"
    imageTag: "7.17.3"
    imagePullPolicy: "IfNotPresent"

    esConfig: {}

    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

    networkHost: "0.0.0.0"

    volumeClaimTemplate:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 30Gi

    protocol: http
    httpPort: 9200
    transportPort: 9300

    service:
      enabled: true
      type: ClusterIP

    antiAffinity: "soft"

    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000

    securityContext:
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000

    clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"

    sysctlInitContainer:
      enabled: true

    persistence:
      enabled: true
