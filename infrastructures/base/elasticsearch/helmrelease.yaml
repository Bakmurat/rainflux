apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elasticsearch
  namespace: flux-system
spec:
  interval: 20h0m0s
  chart:
    spec:
      chart: elasticsearch
      version: 8.5.1
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: logging
  values:
    clusterName: elasticsearch
    replicas: 1
    minimumMasterNodes: 1
    # Password auth ON so Kibana's pre-install hook can create a service
    # account token.  TLS OFF — dev cluster, no wire encryption needed.
    createCert: false
    protocol: http
    secret:
      enabled: true
      password: "changeme"
    esConfig:
      elasticsearch.yml: |
        xpack.security.enabled: true
        xpack.security.transport.ssl.enabled: false
        xpack.security.http.ssl.enabled: false
    clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    esJavaOpts: "-Xmx1g -Xms1g"
    volumeClaimTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi
