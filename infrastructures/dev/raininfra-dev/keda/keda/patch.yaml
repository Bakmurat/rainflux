apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
spec:
  values:
    prometheus:
      metricServer:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring-kube-prometheus-stack
      operator:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring-kube-prometheus-stack
      webhooks:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring-kube-prometheus-stack
