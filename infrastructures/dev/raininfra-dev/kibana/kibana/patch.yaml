apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kibana
spec:
  values:
    ingress:
      enabled: true
      className: "nginx"
      pathtype: Prefix
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      hosts:
        - host: kibana-dev.bolunas.com
          paths:
            - path: /
      tls:
        - secretName: bolunas-com-tls
          hosts:
            - kibana-dev.bolunas.com
