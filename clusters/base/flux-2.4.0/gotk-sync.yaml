---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 59m0s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: ssh://git@github.com/Bakmurat/rainflux.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 59m0s
  path: ./clusters/base/flux-2.4.0
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
