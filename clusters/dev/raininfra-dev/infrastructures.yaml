---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-crds
  namespace: flux-system
spec:
  interval: 20h0m0s
  path: ./infrastructures/dev/raininfra-dev-crds
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-crds
  interval: 20h0m0s
  path: ./infrastructures/dev/raininfra-dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
