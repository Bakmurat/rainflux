---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
    - name: infrastructure-crds
  interval: 20h0m0s
  path: ./infrastructures/dev/001-configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
